version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chartgen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chart_generator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chartgen-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: chart_generator
      JWT_SECRET: chartgen-secret-key-2024
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
