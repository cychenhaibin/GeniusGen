services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-chart-gen
    environment:
      POSTGRES_USER: lawliet
      POSTGRES_PASSWORD: chb20040728
      POSTGRES_DB: chart_generator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawliet -d chart_generator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-chart-gen
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lawliet
      DB_PASSWORD: chb20040728
      DB_NAME: chart_generator
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
