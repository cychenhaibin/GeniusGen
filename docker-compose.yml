version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-chart-gen
    environment:
      POSTGRES_USER: lawliet
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: chart_generator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawliet -d chart_generator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
